name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Testing against the latest LTS versions
        node-version: [22.x, 24.x]
        # Adding a folder matrix to test both parts of your app
        folder: [client, server]

    defaults:
      run:
        working-directory: ${{ matrix.folder }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          # This ensures the cache is linked to the correct folder's lockfile
          cache-dependency-path: './${{ matrix.folder }}/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test