name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'README.md'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '**.md'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]
        folder: [client, server]

    # REMOVED the defaults: working-directory section entirely

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        # This runs in the ROOT 
        run: npm install

      - name: Run linter
        # This tells the root npm to run the lint script FOR the specific workspace
        run: npm run lint -w ${{ matrix.folder }}

      - name: Run tests
        # This tells the root npm to run the test script FOR the specific workspace
        run: npm test -w ${{ matrix.folder }}