name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Testing against the latest LTS versions
        node-version: [22.x, 24.x]
        # Adding a folder matrix to test both parts of your app
        folder: [client, server]

    defaults:
      run:
        working-directory: ${{ matrix.folder }}

    steps:
          - name: Checkout code
            uses: actions/checkout@v6

          - name: Set up Node.js ${{ matrix.node-version }}
            uses: actions/setup-node@v6
            with:
              node-version: ${{ matrix.node-version }}
              cache: 'npm'
              # Crucial: Cache the root lockfile
              cache-dependency-path: './package-lock.json'

          - name: Install dependencies
            # Run install in the root so ESLint is hoisted and available
            run: npm install

          - name: Run linter
            # Use 'npm run lint -w ${{ matrix.folder }}' to run via the workspace
            run: npm run lint -w ${{ matrix.folder }}

          - name: Run tests
            run: npm test -w ${{ matrix.folder }}